<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trading AI Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
      body {
        font-family: Arial;
        margin: 0;
        padding: 20px;
        background: #1a1a1a;
        color: white;
      }
      .dashboard {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }
      .panel {
        background: #2a2a2a;
        padding: 20px;
        border-radius: 8px;
      }
      .signal {
        background: #00ff88;
        color: black;
        padding: 10px;
        border-radius: 5px;
        font-weight: bold;
      }
      button {
        background: #007bff;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 5px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>🧠 Trading AI - SMC Analysis</h1>
    <div class="dashboard">
      <div class="panel">
        <h2>HTF Analysis (4H/1H)</h2>
        <div id="htf-chart"></div>
        <p>Trend: <span id="trend">Analyzing...</span></p>
        <p>Zones: <span id="zones">--</span></p>
      </div>
      <div class="panel">
        <h2>LTF Confirmation (15M/5M)</h2>
        <div id="ltf-chart"></div>
        <p>Status: <span id="ltf-status">Waiting...</span></p>
      </div>
      <div class="panel" style="grid-column: span 2">
        <h2>Active Signals</h2>
        <div id="signals"></div>
        <button onclick="analyze()">Analyze EURUSD</button>
        <button onclick="analyze('GBPUSD')">GBPUSD</button>
      </div>
      <p>Trade Status: <span id="trade-status">Idle</span></p>
    </div>

    <script>
      let tvWidget = null;

      async function analyze(symbol = "EURUSD") {
        const htfRes = await fetch(
          `http://127.0.0.1:8000/analyze/${symbol}/4H`,
        );
        const ltfRes = await fetch(
          `http://127.0.0.1:8000/analyze/${symbol}/15M`,
        );

        const htfData = await htfRes.json();
        const ltfData = await ltfRes.json();

        document.getElementById("trend").textContent = htfData.trend;

        document.getElementById("ltf-status").textContent =
          ltfData.status || "Waiting...";

        updateSignals(htfData.signal);

        renderChart(symbol);
      }
      // Embed TradingView
      function renderChart(symbol) {
        new TradingView.widget({
          container_id: "htf-chart",
          symbol: symbol,
          interval: "240",
          theme: "dark",
          width: "100%",
          height: 400,
        });

        new TradingView.widget({
          container_id: "ltf-chart",
          symbol: symbol,
          interval: "15",
          theme: "dark",
          width: "100%",
          height: 400,
        });
      }
      function updateSignals(signal) {
        const sigDiv = document.getElementById("signals");
        if (signal) {
          sigDiv.innerHTML = `
<div class="signal">
    ${signal.action}<br>
    Entry: ${signal.entry}<br>
    SL: ${signal.sl}<br>
    TP: ${signal.tp}<br>
    RR: ${signal.rr}<br>
    <br>
    <b>Reason:</b><br>
    ${signal.reason}
</div>
`;
        } else {
          sigDiv.innerHTML = "<p>No active signals</p>";
        }
      }

      // Init
      analyze();
    </script>
  </body>
</html>
